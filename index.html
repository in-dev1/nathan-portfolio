<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e0f2fe, #ffffff);
      padding-bottom: 40px;
      transition: 0.3s;
    }

    header {
      background: #111827;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    button {
      padding: 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* DARK MODE */
    .dark-mode {
      background: #0f172a;
      color: white;
    }

    .dark-mode .card {
      background: #1e293b;
      color: white;
    }

    .dark-mode a {
      color: #60a5fa;
    }
  </style>
</head>

<body>

  <header>
    <h1>Your Name</h1>
    <p>Frontend Developer</p>

    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
  </header>

  <section>

    <div class="card">
      <h2>About Me</h2>
      <p id="about">
        I am learning frontend development and building real projects.
      </p>

      <button onclick="changeAbout()">Update About</button>
    </div>

    <div class="card">
      <h2>Projects</h2>
      <p>✔ Portfolio Website</p>

      <a href="https://nathan-portfolio1.netlify.app" target="_blank">
        View Live Site
      </a>
    </div>

    <div class="card">
      <h2>Download CV</h2>

      <a href="cv.html" target="_blank">
        <button>Download CV</button>
      </a>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>Email: yourname@email.com</p>
    </div>

  </section>

  <script>
    function changeAbout() {
      document.getElementById("about").innerText =
        "I am improving my frontend skills and building projects daily!";
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
    }
  </script>

</body>
</html>
