<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ishaya Nathan - Frontend Developer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e0f2fe, #ffffff);
      transition: 0.3s;
    }

    /* NAVBAR */
    nav {
      background: #111827;
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 40px 20px;
    }

    /* CARDS */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      width: 300px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }

    /* BUTTON */
    button, .btn {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      text-decoration: none;
      display: inline-block;
    }

    /* ABOUT ANIMATION (subtle) */
    #about {
      display: inline-block;
      transition: 0.3s;
    }

    #about:hover {
      transform: translateY(-3px);
    }

    /* DARK MODE */
    .dark-mode {
      background: #0f172a;
      color: white;
    }

    .dark-mode .card {
      background: #1e293b;
      color: white;
    }

    .dark-mode nav {
      background: #000;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <div><b>Nathan Dev</b></div>
    <div>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- HEADER -->
  <header>
    <h1>Ishaya Nathan</h1>
    <p>Frontend Developer</p>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
  </header>

  <!-- CONTENT -->
  <div class="container">

    <div class="card" id="about">
      <h2>About Me</h2>
      <p id="aboutText">
        I am learning frontend development and building real projects.
      </p>
      <button onclick="changeAbout()">Update About</button>
    </div>

    <div class="card" id="projects">
      <h2>Projects</h2>
      <p>✔ Portfolio Website</p>

      <a class="btn" href="https://nathan-portfolio1.netlify.app" target="_blank">
        View Live Site
      </a>
    </div>

    <div class="card">
      <h2>Download CV</h2>
      <a class="btn" href="cv.html" target="_blank">Download CV</a>
    </div>

    <div class="card" id="contact">
      <h2>Contact</h2>
      <p>Email: ishayanathaniel@gmail.com</p>
    </div>

  </div>

  <script>
    // ABOUT TEXT CHANGE
    function changeAbout() {
      document.getElementById("aboutText").innerText =
        "I am improving my frontend skills and building real-world projects daily!";
    }

    // DARK MODE WITH MEMORY
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");

      if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    // LOAD SAVED THEME
    window.onload = function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
      }
    };
  </script>

</body>
</html>
